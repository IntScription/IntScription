name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate profile overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: IntScription
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

          plugin_repositories: yes
          plugin_repositories_featured: IntScription/terminal-portfolio, IntScription/rest-assured, IntScription/golf-charity-platform

          plugin_notable: yes
          plugin_notable_repositories: yes

      - name: Generate languages box
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: IntScription
          filename: github-languages.svg
          template: terminal
          base: ""
          config_timezone: Asia/Kolkata

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_other: yes
          plugin_languages_colors: github
          plugin_languages_aliases: javascript:JS, typescript:TS

      - name: Generate contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: IntScription
          filename: github-calendar.svg
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
